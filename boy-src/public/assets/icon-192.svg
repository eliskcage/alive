<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <rect width="192" height="192" fill="#0a0e1a"/>
  <g transform="translate(96,96)">
    <!-- Icosahedron wireframe -->
    <polygon points="0,-60 52,-30 52,30 0,60 -52,30 -52,-30" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>
    <line x1="0" y1="-60" x2="0" y2="60" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>
    <line x1="-52" y1="-30" x2="52" y2="30" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>
    <line x1="52" y1="-30" x2="-52" y2="30" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="4" fill="#00ff88"/>
    <!-- Vertex dots -->
    <circle cx="0" cy="-60" r="3" fill="#00d4ff" opacity="0.8"/>
    <circle cx="52" cy="-30" r="3" fill="#00d4ff" opacity="0.8"/>
    <circle cx="52" cy="30" r="3" fill="#00d4ff" opacity="0.8"/>
    <circle cx="0" cy="60" r="3" fill="#00d4ff" opacity="0.8"/>
    <circle cx="-52" cy="30" r="3" fill="#00d4ff" opacity="0.8"/>
    <circle cx="-52" cy="-30" r="3" fill="#00d4ff" opacity="0.8"/>
  </g>
</svg>
