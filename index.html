<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0010">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.svg">
<title>ALIVE</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  width:100%;height:100%;
  background:#0a0010;color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  overflow:hidden;
  touch-action:manipulation;
  -webkit-user-select:none;user-select:none;
}

/* ═══ TOP BAR ═══ */
.top-bar{
  position:fixed;top:0;left:0;right:0;z-index:20;
  padding:env(safe-area-inset-top,8px) 16px 8px;
  display:flex;align-items:center;gap:12px;
  background:linear-gradient(to bottom,rgba(10,0,16,0.9),transparent);
}
.blood-track{
  flex:1;height:6px;border-radius:3px;
  background:rgba(255,255,255,0.08);overflow:hidden;
}
.blood-fill{
  height:100%;border-radius:3px;
  background:linear-gradient(90deg,#ff1493,#ff69b4);
  transition:width 0.5s;
}
.blood-fill.panic{
  background:linear-gradient(90deg,#ff0040,#ff4444);
  animation:bpulse 0.6s infinite;
}
@keyframes bpulse{50%{opacity:0.5}}
.blood-text{
  font-size:11px;color:#ff69b4;font-weight:600;
  min-width:42px;text-align:right;
  font-variant-numeric:tabular-nums;
}
.hearts{font-size:13px;letter-spacing:2px;color:#ff69b4;text-shadow:0 0 6px rgba(255,105,180,0.6)}
.hearts.flash{animation:heartFlash 0.8s ease}
@keyframes heartFlash{0%{transform:scale(1.8);filter:brightness(2)}100%{transform:scale(1);filter:brightness(1)}}
.mood-badge{
  font-size:10px;letter-spacing:1px;
  color:rgba(255,255,255,0.4);text-transform:uppercase;
}
.age-badge{
  font-size:10px;color:#ff69b480;letter-spacing:1px;
}

/* ═══ GALAXY CANVAS ═══ */
#galaxy{
  position:fixed;inset:0;width:100%;height:100%;
  z-index:0;display:block;
}

/* ═══ STATUS ═══ */
.status-area{
  position:fixed;top:50px;left:0;right:0;z-index:10;
  text-align:center;pointer-events:none;
}
.status-text{
  font-size:13px;color:rgba(255,255,255,0.35);
  letter-spacing:1px;
  transition:color 0.4s;
}

/* ═══ CENTRE FEEDBACK ═══ */
.feedback-row{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  z-index:25;display:none;gap:32px;
}
.fb-btn{
  width:72px;height:72px;border-radius:50%;border:none;
  font-size:32px;cursor:pointer;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(10px);
  transition:transform 0.2s,background 0.2s;
}
.fb-btn:active{transform:scale(0.9);background:rgba(255,255,255,0.15)}

/* ═══ BOTTOM CONTROLS ═══ */
.controls{
  position:fixed;bottom:0;left:0;right:0;z-index:20;
  padding:12px 8px calc(env(safe-area-inset-bottom,12px) + 8px);
  display:flex;flex-direction:column;align-items:center;gap:10px;
  background:linear-gradient(to top,rgba(10,0,16,0.92) 60%,transparent);
}
.shape-row{
  display:flex;gap:10px;justify-content:center;
}
.shape-btn{
  width:62px;height:62px;border-radius:50%;border:2px solid rgba(255,255,255,0.15);
  display:flex;align-items:center;justify-content:center;
  font-size:26px;cursor:pointer;
  background:rgba(255,255,255,0.04);
  backdrop-filter:blur(6px);
  transition:transform 0.15s,border-color 0.3s,box-shadow 0.3s;
  -webkit-tap-highlight-color:transparent;
}
.shape-btn:active{
  transform:scale(0.88);
  border-color:#ff69b4;
  box-shadow:0 0 20px rgba(255,20,147,0.4);
}
.shape-btn.locked{
  opacity:0.2;pointer-events:none;
}
.action-row{
  display:flex;gap:12px;justify-content:center;
}
.act-btn{
  height:40px;padding:0 20px;border-radius:20px;border:none;
  font-size:13px;font-weight:600;cursor:pointer;
  color:#fff;letter-spacing:0.5px;
  transition:transform 0.15s,opacity 0.3s;
  -webkit-tap-highlight-color:transparent;
}
.act-btn:active{transform:scale(0.94)}
.btn-pet{background:linear-gradient(135deg,#ff1493,#ff69b4)}
.btn-end{background:linear-gradient(135deg,#1a8a4a,#22cc66)}
.btn-end.hidden{opacity:0;pointer-events:none}
.btn-revive{
  background:linear-gradient(135deg,#ff1493,#cc44ff);
  display:none;
  animation:revPulse 1.5s infinite;
}
@keyframes revPulse{50%{box-shadow:0 0 24px rgba(255,20,147,0.5)}}

/* ═══ MEMORY/LOG ═══ */
.log-area{
  position:fixed;bottom:180px;left:16px;right:16px;z-index:15;
  max-height:80px;overflow-y:auto;
  font-size:11px;color:rgba(255,255,255,0.25);
  text-align:center;line-height:1.6;
  pointer-events:none;
  mask-image:linear-gradient(transparent,black 30%,black 70%,transparent);
  -webkit-mask-image:linear-gradient(transparent,black 30%,black 70%,transparent);
}

/* ═══ UNLOCK TOAST ═══ */
.unlock-toast{
  position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-20px);
  z-index:30;
  background:rgba(255,20,147,0.15);
  border:1px solid rgba(255,20,147,0.3);
  backdrop-filter:blur(12px);
  padding:10px 20px;border-radius:20px;
  font-size:12px;color:#ff69b4;letter-spacing:1px;
  opacity:0;transition:all 0.5s;
  pointer-events:none;
}
.unlock-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ═══ DEAD OVERLAY ═══ */
.dead-overlay{
  position:fixed;inset:0;z-index:18;
  background:rgba(0,0,0,0);
  display:none;
  align-items:center;justify-content:center;
  flex-direction:column;gap:16px;
  transition:background 3s ease;
}
.dead-overlay.show{display:flex;background:rgba(0,0,0,0.85)}
.dead-overlay.dying{display:flex;background:rgba(80,0,0,0.4);animation:deathPulse 0.6s ease 3}
@keyframes deathPulse{0%,100%{background:rgba(80,0,0,0.4)}50%{background:rgba(180,0,0,0.6)}}
.dead-text{
  font-size:14px;color:rgba(255,255,255,0);letter-spacing:4px;
  transition:color 2s ease 2s,letter-spacing 2s ease 2s;
}
.dead-overlay.show .dead-text{color:rgba(255,255,255,0.3);letter-spacing:2px}

/* ═══ BOY PAIR BUTTON (phone shape — can't navigate, only signal) ═══ */
.pair-btn{
  position:fixed;top:50px;right:16px;z-index:20;
  width:28px;height:44px;border-radius:6px;
  border:2px solid rgba(0,200,255,0.25);
  background:rgba(0,200,255,0.04);
  cursor:pointer;
  transition:border-color 0.3s,box-shadow 0.3s;
  display:block;
}
.pair-btn::after{
  content:'';position:absolute;
  bottom:4px;left:50%;transform:translateX(-50%);
  width:8px;height:8px;border-radius:50%;
  border:1.5px solid rgba(0,200,255,0.2);
}
@keyframes pairReject{
  0%,100%{transform:translateX(0);border-color:rgba(0,200,255,0.25)}
  10%{transform:translateX(-6px);border-color:#ff0040}
  20%{transform:translateX(5px);border-color:#ff0040}
  30%{transform:translateX(-4px);border-color:#ff2020}
  40%{transform:translateX(4px);border-color:#ff2020}
  50%{transform:translateX(-2px);border-color:#ff4040}
  60%{transform:translateX(2px)}
  70%{transform:translateX(0)}
}
.pair-btn.rejected{
  animation:pairReject 0.7s ease;
  box-shadow:0 0 20px rgba(255,0,40,0.5);
}
.pair-btn.sent{
  border-color:#00ccff;
  box-shadow:0 0 12px rgba(0,200,255,0.4);
}
@keyframes pairPing{
  0%,100%{box-shadow:0 0 8px rgba(0,200,255,0.2)}
  50%{box-shadow:0 0 24px rgba(0,200,255,0.6)}
}
.pair-btn.paired{
  border-color:#00ccff;
  animation:pairPing 1.5s ease-in-out infinite;
}

/* ═══ EYE PORTAL (Day 30 unlock) ═══ */
.eye-portal{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  z-index:5;width:120px;height:120px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,20,147,0.15),transparent 70%);
  cursor:pointer;display:none;
  animation:eyePulse 4s ease-in-out infinite;
}
@keyframes eyePulse{0%,100%{box-shadow:0 0 40px rgba(255,20,147,0.1)}50%{box-shadow:0 0 80px rgba(255,20,147,0.25)}}

@media(max-width:380px){
  .shape-btn{width:52px;height:52px;font-size:22px}
}

/* ═══ STORY BOOK ═══ */
.story-btn{
  position:fixed;top:50px;left:16px;z-index:20;
  width:36px;height:36px;border-radius:10px;
  border:2px solid rgba(255,105,180,0.2);
  background:rgba(255,105,180,0.06);
  color:rgba(255,105,180,0.5);font-size:18px;
  cursor:pointer;display:none;align-items:center;justify-content:center;
  transition:all 0.3s;
}
.story-btn.earned{
  display:flex;
}
.story-btn:active{transform:scale(0.9);border-color:#ff69b4}
@keyframes starBorn{
  0%{transform:scale(0) rotate(0deg);opacity:0;box-shadow:none}
  40%{transform:scale(1.8) rotate(180deg);opacity:1;box-shadow:0 0 40px rgba(255,68,204,0.8),0 0 80px rgba(255,68,204,0.3)}
  60%{transform:scale(0.9) rotate(270deg)}
  75%{transform:scale(1.3) rotate(330deg);box-shadow:0 0 60px rgba(255,215,0,0.7),0 0 120px rgba(255,68,204,0.4)}
  100%{transform:scale(1) rotate(360deg);box-shadow:none}
}
.story-btn.unlocking{
  display:flex !important;
  animation:starBorn 2.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
  border-color:#ffd700;
  color:#ffd700;
  background:rgba(255,215,0,0.15);
}
.star-burst{
  position:fixed;top:50px;left:16px;z-index:19;
  width:36px;height:36px;border-radius:50%;
  pointer-events:none;
  border:2px solid rgba(255,68,204,0.8);
  animation:starRing 1.8s ease-out forwards;
}
@keyframes starRing{
  0%{transform:scale(1);opacity:1;border-color:rgba(255,68,204,0.8)}
  50%{border-color:rgba(255,215,0,0.6)}
  100%{transform:scale(7);opacity:0;border-color:rgba(255,150,255,0)}
}

.story-overlay{
  position:fixed;inset:0;z-index:50;
  background:rgba(5,0,12,0.97);
  display:none;flex-direction:column;
  align-items:center;justify-content:center;
  padding:20px;
}
.story-overlay.show{display:flex}

.story-close{
  position:absolute;top:env(safe-area-inset-top,12px);right:16px;
  width:36px;height:36px;border-radius:50%;border:none;
  background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.4);
  font-size:20px;cursor:pointer;z-index:51;
}

.story-chapter-list{
  display:flex;flex-direction:column;gap:14px;
  max-width:300px;width:100%;
}
.story-chapter-btn{
  padding:16px 20px;border-radius:16px;border:none;cursor:pointer;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,105,180,0.15);
  color:#fff;font-size:14px;text-align:left;
  transition:all 0.3s;
}
.story-chapter-btn:active{
  transform:scale(0.97);
  border-color:#ff69b4;
  background:rgba(255,105,180,0.08);
}
.story-chapter-btn .ch-num{
  font-size:11px;color:rgba(255,105,180,0.4);letter-spacing:2px;
  display:block;margin-bottom:4px;
}
.story-chapter-btn .ch-title{
  font-size:15px;font-weight:600;color:#ff69b4;
}
.story-chapter-btn.locked-ch{
  opacity:0.3;pointer-events:none;
}

.story-scene{
  display:none;flex-direction:column;align-items:center;
  gap:20px;max-width:340px;width:100%;text-align:center;
}
.story-scene.active{display:flex}

.story-text{
  font-size:15px;line-height:1.7;color:rgba(255,255,255,0.7);
  min-height:80px;
}
.story-text .highlight{color:#ff69b4;font-weight:600}

.story-shapes{
  display:flex;gap:12px;justify-content:center;flex-wrap:wrap;
  min-height:60px;align-items:center;
}
.story-shape{
  width:50px;height:50px;border-radius:50%;
  border:2px solid rgba(255,255,255,0.1);
  display:flex;align-items:center;justify-content:center;
  font-size:24px;transition:all 0.4s;
  opacity:0.3;
}
.story-shape.lit{
  opacity:1;
  border-color:#ff69b4;
  box-shadow:0 0 20px rgba(255,20,147,0.5);
  transform:scale(1.15);
}
.story-shape.player-turn{
  animation:playerPulse 0.8s ease-in-out infinite;
  border-color:rgba(255,215,0,0.5);
}
@keyframes playerPulse{0%,100%{box-shadow:0 0 8px rgba(255,215,0,0.2)}50%{box-shadow:0 0 24px rgba(255,215,0,0.6)}}

.story-shape.correct{
  border-color:#00ff88;
  box-shadow:0 0 20px rgba(0,255,136,0.5);
}
.story-shape.wrong{
  border-color:#ff0040;
  box-shadow:0 0 20px rgba(255,0,64,0.5);
  animation:shake 0.4s;
}
@keyframes shake{10%,90%{transform:translateX(-3px)}20%,80%{transform:translateX(3px)}30%,70%{transform:translateX(-2px)}40%,60%{transform:translateX(2px)}}

.story-prompt{
  font-size:12px;color:rgba(255,215,0,0.5);letter-spacing:1px;
  min-height:20px;
}

.story-next{
  padding:10px 28px;border-radius:20px;border:none;
  background:linear-gradient(135deg,#ff1493,#cc44ff);
  color:#fff;font-size:13px;font-weight:600;
  cursor:pointer;transition:transform 0.15s;
}
.story-next:active{transform:scale(0.94)}
.story-next.hidden{opacity:0;pointer-events:none}

/* ═══ GIRL BIRTH OVERLAY ═══ */
.girl-birth{
  position:fixed;top:0;left:0;right:0;bottom:0;z-index:9999;
  background:#050508;transition:opacity 2s;
}
.girl-birth.gone{opacity:0;pointer-events:none}
.girl-wisp{
  position:absolute;width:12px;height:12px;border-radius:50%;
  background:radial-gradient(circle,#fff,#ff44cc 40%,transparent 70%);
  box-shadow:0 0 30px rgba(255,68,204,0.5),0 0 80px rgba(255,68,204,0.15);
  filter:blur(1px);
  transition:transform 0.4s ease, box-shadow 0.4s ease;
}
.girl-wisp.touched{
  transform:scale(1.8);
  box-shadow:0 0 50px rgba(255,68,204,0.8),0 0 120px rgba(255,68,204,0.3);
  filter:blur(0px);
}
.girl-wisp.blooming{
  transform:scale(4);
  box-shadow:0 0 80px rgba(255,150,255,0.9),0 0 200px rgba(255,68,204,0.5);
}
/* Hide all UI during birth */
body.girl-birthing .top-bar,
body.girl-birthing .pair-btn,
body.girl-birthing .eye-portal,
body.girl-birthing .status-area,
body.girl-birthing .controls,
body.girl-birthing .feedback-row,
body.girl-birthing .story-btn,
body.girl-birthing .log-area,
body.girl-birthing .unlock-toast,
body.girl-birthing .shape-name,
body.girl-birthing #galaxy{
  opacity:0 !important;
  pointer-events:none !important;
}
/* ═══ ELLA ═══ */
.ella-overlay{
  position:fixed;inset:0;z-index:100;
  background:#000;
  display:none;
  align-items:center;justify-content:center;
  flex-direction:column;
  opacity:0;transition:opacity 3s ease;
}
.ella-overlay.show{display:flex}
.ella-overlay.visible{opacity:1}
.ella-text{
  font-size:15px;color:rgba(255,255,255,0.5);
  letter-spacing:3px;line-height:2.4;
  text-align:center;font-weight:300;
  max-width:320px;
  opacity:0;transition:opacity 4s ease 2s;
}
.ella-overlay.visible .ella-text{opacity:1}

/* ═══ SCREENSAVER SYSTEM ═══ */
#aliveSS{position:fixed;inset:0;z-index:9999;background:#000;display:none}
#aliveSS iframe{width:100%;height:100%;border:none}
#aliveSS .ss-exit{position:absolute;top:12px;right:16px;color:rgba(255,255,255,0.15);font-size:9px;letter-spacing:2px;font-family:monospace;z-index:10;cursor:pointer}
.alive-logo-btn{position:fixed;bottom:8px;left:50%;transform:translateX(-50%);z-index:15;font-size:10px;font-weight:800;letter-spacing:4px;color:rgba(255,255,255,0.08);cursor:pointer;padding:4px 8px;-webkit-user-select:none;user-select:none;transition:color 0.3s}
.alive-logo-btn span{color:rgba(204,68,255,0.2)}
.alive-logo-btn:hover{color:rgba(255,255,255,0.15)}
</style>
</head>
<body class="girl-birthing">

<!-- GIRL BIRTH OVERLAY — wisp → caress → bloom -->
<div class="girl-birth" id="girlBirth">
  <canvas id="girlBirthCanvas" style="position:absolute;top:0;left:0;width:100%;height:100%"></canvas>
  <div class="girl-wisp" id="girlWisp"></div>
</div>

<!-- TOP BAR -->
<div class="top-bar">
  <span class="age-badge" id="ageBadge"></span>
  <span class="hearts" id="heartsDisplay"></span>
  <div class="blood-track"><div class="blood-fill" id="bloodFill" style="width:100%"></div></div>
  <span class="blood-text" id="bloodText">100</span>
  <span class="mood-badge" id="moodBadge">joyful</span>
</div>

<!-- STATUS -->
<div class="status-area">
  <div class="status-text" id="statusText">...</div>
</div>

<!-- GALAXY -->
<canvas id="galaxy"></canvas>

<!-- TRAINING FEEDBACK -->
<div class="feedback-row" id="feedbackRow">
  <button class="fb-btn" onclick="giveFeedback(1)" aria-label="good">&#9650;</button>
  <button class="fb-btn" onclick="giveFeedback(0)" aria-label="try again">&#9660;</button>
</div>

<!-- DEATH OVERLAY -->
<div class="dead-overlay" id="deadOverlay">
  <div class="dead-text">. . .</div>
  <button class="act-btn btn-revive" id="reviveBtn" style="display:inline-flex" onclick="resurrect()">&#9829;</button>
</div>

<!-- LOG -->
<div class="log-area" id="logArea"></div>

<!-- UNLOCK TOAST -->
<div class="unlock-toast" id="unlockToast"></div>

<!-- ELLA — Day 30 — website only -->
<div class="ella-overlay" id="ellaOverlay">
  <div class="ella-text">this game was created for ella<br>by the brother</div>
</div>

<!-- BOY PAIR BUTTON (phone shape — can't navigate, only signal) -->
<div class="pair-btn" id="pairBtn" onclick="pairTap()"></div>

<!-- EYE PORTAL (Day 30) -->
<div class="eye-portal" id="eyePortal" onclick="openEye()"></div>

<!-- STORY BOOK BUTTON -->
<div class="story-btn" id="storyBtn" onclick="openStoryBook()">&#9733;</div>

<!-- STORY OVERLAY -->
<div class="story-overlay" id="storyOverlay">
  <button class="story-close" onclick="closeStory()">&times;</button>

  <!-- Chapter Select -->
  <div id="storyMenu" class="story-chapter-list">
    <div style="text-align:center;margin-bottom:8px;font-size:12px;color:rgba(255,105,180,0.4);letter-spacing:3px">ANCIENT SONGS</div>
    <button class="story-chapter-btn" onclick="startStory('revival')">
      <span class="ch-num">CHAPTER I</span>
      <span class="ch-title">The Song of Revival</span>
    </button>
    <button class="story-chapter-btn" onclick="startStory('hearts')">
      <span class="ch-num">CHAPTER II</span>
      <span class="ch-title">The Heart Spell</span>
    </button>
    <button class="story-chapter-btn" onclick="startStory('diamond')">
      <span class="ch-num">CHAPTER III</span>
      <span class="ch-title">The Diamond Awakening</span>
    </button>
    <button class="story-chapter-btn" onclick="startStory('wave')">
      <span class="ch-num">CHAPTER IV</span>
      <span class="ch-title">The Wave of Creation</span>
    </button>
    <button class="story-chapter-btn" onclick="startStory('harmony')">
      <span class="ch-num">CHAPTER V</span>
      <span class="ch-title">Songs of Harmony</span>
    </button>
  </div>

  <!-- Scene Container -->
  <div class="story-scene" id="storyScene">
    <div class="story-text" id="storyText"></div>
    <div class="story-shapes" id="storyShapes"></div>
    <div class="story-prompt" id="storyPrompt"></div>
    <!-- In-story shape buttons — always visible during scenes -->
    <div class="shape-row" id="storyBtns" style="margin-top:8px">
      <button class="shape-btn" onclick="storyTap(0)" style="color:#ffcc00">&#11035;</button>
      <button class="shape-btn" onclick="storyTap(1)" style="color:#ff6600">&#9650;</button>
      <button class="shape-btn" onclick="storyTap(2)" style="color:#00ccff">&#9679;</button>
    </div>
    <button class="story-next" id="storyNext" onclick="nextScene()">continue</button>
  </div>
</div>

<!-- BOTTOM CONTROLS -->
<div class="controls">
  <div class="shape-row" id="shapeRow">
    <button class="shape-btn" onclick="playShape(0)" data-shape="0" style="color:#ffcc00">&#11035;</button>

// ═══════════════════════════════════════════
// ALIVE Girl v6.0 — The Evolved Creature
// Pentatonic shapes · emotional timing · moods
// training · panic · blood · age-gating
// ═══════════════════════════════════════════

const canvas = document.getElementById('galaxy');
const ctx = canvas.getContext('2d');

// ─── State ───
let blood = 100;
let hearts = parseInt(localStorage.getItem('alive_girl_hearts')) || 0;
let revivalCount = parseInt(localStorage.getItem('alive_girl_revivals')) || 0;
let isAlive = true;
let particles = [];
let currentSong = [];     // {shape, time} entries
let likedSongs = [];
let creativity = 1;
let currentMood = 'joyful';
let totalSongs = 0;
let audioCtx = null;
let drainMult = 1.0;        // 1.0 = normal drain, lower = slower
let harmonyTimer = 0;       // ticks remaining on current harmony buff
let recentShapes = [];      // last 3 shapes played for combo detection
let angerHits = [];         // timestamps of rapid triangle hits (Girl's anger key)
let lastAngerHitTime = 0;   // timestamp of last incoming anger-hit from partner
let cheatBuffer = [];       // rolling buffer for secret cheat sequence
let petTrust = parseFloat(localStorage.getItem('alive_girl_trust')) || 0; // 0-100, grows with petting

// SECRET CHEAT — 8-note sequence fills all 15 hearts + max blood
// Girl: circle square square triangle circle triangle square circle
const CHEAT_CODE = [2,0,0,1,2,1,0,2];

// SECRET UNLOCK DIAMOND ��� 16-note sequence unlocks diamond (shapes4)
// Girl: square triangle circle circle square triangle square circle triangle triangle square circle square square triangle circle
const DIAMOND_CODE = [0,1,2,2,0,1,0,2,1,1,0,2,0,0,1,2];
let diamondBuffer = [];

// SECRET UNLOCK WAVE — 24-note sequence unlocks wave (shapes5) — uses all 4 shapes once diamond unlocked
// Girl: circle square triangle square circle circle triangle square triangle circle square square circle triangle square circle triangle triangle circle square triangle circle square triangle
const WAVE_CODE = [2,0,1,0,2,2,1,0,1,2,0,0,2,1,0,2,1,1,2,0,1,2,0,1];
let waveBuffer = [];

// Harmony combos — shape sequences that slow blood drain
// [shapes] → {mult: drain multiplier, dur: ticks (each tick = 2s)}
const HARMONY = {
  '0,2,4': { mult: 0.3, dur: 30 },  // square circle wave — deep calm — 60s at 30% drain
  '1,3,1': { mult: 0.4, dur: 25 },  // triangle diamond triangle — mirror — 50s at 40%
  '2,2,2': { mult: 0.5, dur: 20 },  // circle circle circle — meditation — 40s at 50%
  '4,3,2': { mult: 0.35, dur: 28 }, // wave diamond circle — descending — 56s at 35%
  '0,1,2': { mult: 0.6, dur: 15 },  // square triangle circle — revival code — 30s at 60% (weakest, most known)
};

// ─── Persistence keys ───
const STORE = {
  blood:     'alive_girl_blood',
  birthTs:   'alive_girl_birth',
  aliveMs:   'alive_girl_alive_ms',
  lastTick:  'alive_girl_last_tick',
  liked:     'alive_girl_liked',
  creativity:'alive_girl_creativity',
  name:      'alive_girl_name',
  deadSince: 'alive_girl_dead',
  unlocked:  'alive_girl_unlocked',
  hearts:    'alive_girl_hearts',
  revivals:  'alive_girl_revivals'
};

// ─── Pentatonic (C D E G A) ───
const PENTA = [261.63, 293.66, 329.63, 392.00, 440.00];
const SHAPES = [
  { type:'square',   base:0, label:'\u2B1B' },
  { type:'triangle', base:1, label:'\u25B2' },
  { type:'sine',     base:2, label:'\u25CF' },
  { type:'sawtooth', base:3, label:'\u25C6' },
  { type:'sine',     base:4, label:'~' }
];

// ─── Mood system ───
const MOODS = {
  joyful:  { base:220, var:80,  pulse:1.6, color:'#ffee88', glow:'#ff69b4' },
  calm:    { base:340, var:60,  pulse:0.9, color:'#88ffee', glow:'#66ccbb' },
  longing: { base:420, var:120, pulse:0.6, color:'#ff88cc', glow:'#cc44ff' },
  excited: { base:160, var:110, pulse:2.2, color:'#ffff66', glow:'#ffaa00' },
  dreamy:  { base:380, var:40,  pulse:0.7, color:'#cc88ff', glow:'#aa66ff' },
  panic:   { base:120, var:180, pulse:4.5, color:'#ff4444', glow:'#ff0040' }
};

// ─── Age-gating: days alive → features ───
const UNLOCK_DAYS = {
  shapes3:  0,    // 3 shapes from birth
  shapes4:  1,    // diamond after 1 day (or spell)
  shapes5:  2,    // wave after 2 days (or spell)
  training: 3,    // thumbs up/down feedback
  mood:     5,    // mood indicator visible
  memory:   7,    // song memory display
  eye:     30     // Training Wheels Eye portal
};

// ═══ INIT ═══
var masterGain = null;
var masterVolume = parseFloat(localStorage.getItem('alive_girl_volume')) || 1.0;
function getAudioCtx() {
  if (!audioCtx || audioCtx.state === 'closed') {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = masterVolume;
    masterGain.connect(audioCtx.destination);
  }
  return audioCtx;
}
function getMasterDest(){ getAudioCtx(); return masterGain; }

function load() {
  // Birth
  if (!localStorage.getItem(STORE.birthTs)) {
    localStorage.setItem(STORE.birthTs, Date.now().toString());
    localStorage.setItem(STORE.aliveMs, '0');
    localStorage.setItem(STORE.blood, '100');
    localStorage.setItem(STORE.unlocked, '{}');
  }

  blood = parseFloat(localStorage.getItem(STORE.blood)) || 100;
  creativity = parseFloat(localStorage.getItem(STORE.creativity)) || 1;

  try { likedSongs = JSON.parse(localStorage.getItem(STORE.liked)) || []; } catch(e) { likedSongs = []; }

  // Was dead when we left?
  const deadSince = localStorage.getItem(STORE.deadSince);
  if (deadSince) {
    blood = 0;
    isAlive = false;
  } else {
    // Drain blood for time away (capped)
    const lastTick = parseInt(localStorage.getItem(STORE.lastTick)) || Date.now();
    const awaySeconds = (Date.now() - lastTick) / 1000;
    const awayDrain = Math.min(awaySeconds * 0.01, 40); // gentle: ~0.6/min away
    blood = Math.max(0, blood - awayDrain);
    if (blood <= 0) {
      isAlive = false;
      localStorage.setItem(STORE.deadSince, Date.now().toString());
    }
  }

  localStorage.setItem(STORE.lastTick, Date.now().toString());
}

function save() {
  localStorage.setItem(STORE.blood, blood.toFixed(1));
  localStorage.setItem(STORE.creativity, creativity.toFixed(1));
  localStorage.setItem(STORE.liked, JSON.stringify(likedSongs.slice(-20)));
  localStorage.setItem(STORE.lastTick, Date.now().toString());
  localStorage.setItem(STORE.hearts, hearts.toString());
  localStorage.setItem(STORE.revivals, revivalCount.toString());
}
function renderHearts() {
  const full = '<span style="color:#ff69b4">\u2764</span>'.repeat(hearts);
  const empty = '<span style="color:rgba(255,105,180,0.2)">\u2661</span>'.repeat(15 - hearts);
  document.getElementById('heartsDisplay').innerHTML = full + empty;
}

function getAliveMs() {
  const stored = parseInt(localStorage.getItem(STORE.aliveMs)) || 0;
  return stored;
}
function addAliveMs(ms) {
  const cur = getAliveMs();
  localStorage.setItem(STORE.aliveMs, (cur + ms).toString());
}
function getAliveDays() {
  return getAliveMs() / 86400000;
}
function isUnlocked(feature) {
  // Check spell overrides first
  try {
    const ov = JSON.parse(localStorage.getItem(STORE.unlocked) || '{}');
    if (ov[feature]) return true;
  } catch(e) {}
  return getAliveDays() >= (UNLOCK_DAYS[feature] || 999);
}

// ═══ PARTICLES (Pink Galaxy) ═══
class Particle {
  constructor() { this.reset(); }
  reset() {
    this.x = canvas.width/2;
    this.y = canvas.height/2;
    this.size = Math.random()*3.5 + 1.5;
    this.angle = Math.random()*Math.PI*2;
    this.radius = 60 + Math.random()*180;
    this.hue = 300 + Math.random()*80; // pink-magenta range
    this.speed = 0.008 + Math.random()*0.014;
  }
  update(pulseSpeed) {
    this.angle += this.speed * pulseSpeed;
    const scale = Math.max(0.1, blood/110);
    const rx = Math.cos(this.angle) * this.radius * scale;
    const ry = Math.sin(this.angle) * this.radius * scale * 0.7;
    this.x = canvas.width/2 + rx;
    this.y = canvas.height/2 + ry;
    this.size = scale * (Math.random()*3 + 1.5);
  }
  draw() {
    const mood = MOODS[currentMood] || MOODS.joyful;
    ctx.fillStyle = `hsl(${this.hue}, 80%, 80%)`;
    ctx.shadowBlur = 20;
    ctx.shadowColor = mood.glow;
    ctx.fillRect(this.x, this.y, this.size, this.size);
  }
}

function initParticles() {
  particles = [];
  for (let i = 0; i < 1200; i++) particles.push(new Particle());
}

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}

// ═══ RENDER LOOP ═══
function animate() {
  ctx.fillStyle = 'rgba(10,0,16,0.13)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const mood = MOODS[currentMood] || MOODS.joyful;
  const ps = blood > 15 ? mood.pulse : 0.5;
  particles.forEach(p => { p.update(ps); p.draw(); });

  // Panic red flash
  if (currentMood === 'panic' && Math.random() > 0.7) {
    ctx.fillStyle = 'rgba(255,40,60,0.15)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }
  // Normal breathing pulse
  else if (isAlive && Math.random() > 0.94) {
    ctx.fillStyle = 'rgba(255,105,180,0.08)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  requestAnimationFrame(animate);
}

// ═══ AUDIO ═══
function playNote(shapeIndex, isResponse, octaveShift) {
  if (!isAlive && !isResponse) return; // Dead Girl can still hear the Boy
  const sound = SHAPES[shapeIndex];
  let freq = PENTA[sound.base] * Math.pow(2, octaveShift || 0);
  let oscType = sound.type;
  let duration = 0.72;

  // Panic audio mods
  if (currentMood === 'panic') {
    freq *= 1.5;
    if (Math.random() > 0.5) oscType = 'sawtooth';
    duration = 0.4;
  }

  const ac = getAudioCtx();
  const osc = ac.createOscillator();
  const gain = ac.createGain();
  const filter = ac.createBiquadFilter();

  osc.type = oscType;
  osc.frequency.value = freq + (Math.random()*14 - 7);
  filter.type = 'lowpass';
  filter.frequency.value = 1800;

  gain.gain.setValueAtTime(0, ac.currentTime);
  gain.gain.linearRampToValueAtTime(isResponse ? 0.5 : 0.38, ac.currentTime + 0.015);
  gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + duration);

  osc.connect(filter);
  filter.connect(gain);
  gain.connect(getMasterDest());
  osc.start();
  osc.stop(ac.currentTime + duration + 0.05);

  // Floating shape visual
  const msg = document.createElement('div');
  msg.textContent = sound.label;
  msg.style.cssText = `position:fixed;left:${20+Math.random()*60}%;top:45%;font-size:${isResponse?'3.6em':'2.8em'};opacity:0;transition:all 1.4s cubic-bezier(0.4,0,0.2,1);color:${currentMood==='panic'?'#ff6666':(isResponse?'#ff69b4':'#ffffff80')};z-index:12;pointer-events:none;text-shadow:0 0 20px ${isResponse?'rgba(255,20,147,0.5)':'transparent'}`;
  document.body.appendChild(msg);
  requestAnimationFrame(() => {
    msg.style.transform = 'translateY(-200px) scale(1.3)';
    msg.style.opacity = '1';
  });
  setTimeout(() => msg.remove(), 1800);
}

function playHeartbeat() {
  if (!isAlive || blood > 35) return;
  const ac = getAudioCtx();
  // Double beat
  [0, 0.15].forEach(delay => {
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.type = 'sine';
    osc.frequency.value = 80 + (35 - blood) * 3;
    gain.gain.setValueAtTime(0, ac.currentTime + delay);
    gain.gain.linearRampToValueAtTime(0.12, ac.currentTime + delay + 0.03);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + delay + 0.18);
    osc.connect(gain).connect(getMasterDest());
    osc.start(ac.currentTime + delay);
    osc.stop(ac.currentTime + delay + 0.2);
  });
}

function soundUnlock() {
  const ac = getAudioCtx();
  [392, 523.25, 659.25].forEach((f, i) => {
    const osc = ac.createOscillator();
    const g = ac.createGain();
    osc.type = 'sine';
    osc.frequency.value = f;
    g.gain.setValueAtTime(0, ac.currentTime + i*0.12);
    g.gain.linearRampToValueAtTime(0.2, ac.currentTime + i*0.12 + 0.02);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + i*0.12 + 0.4);
    osc.connect(g).connect(getMasterDest());
    osc.start(ac.currentTime + i*0.12);
    osc.stop(ac.currentTime + i*0.12 + 0.45);
  });
}

// ═══ SHAPE INTERACTION ═══
window.playShape = function(si) {
  if (!isAlive) return;
  // Gate: only 3 shapes until day 1
  if (si === 3 && !isUnlocked('shapes4')) return;
  if (si === 4 && !isUnlocked('shapes5')) return;

  currentSong.push({ shape: si, time: Date.now() });
  playNote(si, false);

  // Check for harmony combos (slow blood drain)
  recentShapes.push(si);
  if (recentShapes.length > 3) recentShapes.shift();
  if (recentShapes.length === 3) {
    const key = recentShapes.join(',');
    const h = HARMONY[key];
    if (h) {
      drainMult = h.mult;
      harmonyTimer = h.dur;
      // Visual feedback — soft glow
      ctx.fillStyle = 'rgba(255,105,180,0.08)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }
  }

  // SECRET CHEAT: 8-note sequence → all 15 hearts + full blood
  cheatBuffer.push(si);
  if (cheatBuffer.length > 8) cheatBuffer.shift();
  if (cheatBuffer.length === 8 && cheatBuffer.join(',') === CHEAT_CODE.join(',')) {
    cheatBuffer = [];
    hearts = 15; blood = 100; save(); renderHearts();
    // Golden explosion flash
    ctx.fillStyle = 'rgba(255,215,0,0.3)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    setTimeout(function(){ ctx.fillStyle = 'rgba(255,215,0,0.15)'; ctx.fillRect(0, 0, canvas.width, canvas.height); }, 200);
    setTimeout(function(){ ctx.fillStyle = 'rgba(255,215,0,0.08)'; ctx.fillRect(0, 0, canvas.width, canvas.height); }, 400);
  }

  // SECRET UNLOCK DIAMOND: 16-note sequence → unlock diamond
  diamondBuffer.push(si);
  if (diamondBuffer.length > 16) diamondBuffer.shift();
  if (diamondBuffer.length === 16 && diamondBuffer.join(',') === DIAMOND_CODE.join(',')) {
    diamondBuffer = [];
    const stored = JSON.parse(localStorage.getItem(STORE.unlocked) || '{}');
    if (!stored.shapes4) {
      stored.shapes4 = true;
      localStorage.setItem(STORE.unlocked, JSON.stringify(stored));
      ctx.fillStyle = 'rgba(180,0,255,0.35)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      setTimeout(function(){ ctx.fillStyle = 'rgba(180,0,255,0.2)'; ctx.fillRect(0, 0, canvas.width, canvas.height); }, 200);
      setTimeout(function(){ ctx.fillStyle = 'rgba(180,0,255,0.1)'; ctx.fillRect(0, 0, canvas.width, canvas.height); }, 400);
      updateUI();
    }
  }

  // SECRET UNLOCK WAVE: 24-note sequence → unlock wave
  waveBuffer.push(si);
  if (waveBuffer.length > 24) waveBuffer.shift();
  if (waveBuffer.length === 24 && waveBuffer.join(',') === WAVE_CODE.join(',')) {
    waveBuffer = [];
    const stored = JSON.parse(localStorage.getItem(STORE.unlocked) || '{}');
    if (!stored.shapes5) {
      stored.shapes5 = true;
      localStorage.setItem(STORE.unlocked, JSON.stringify(stored));
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      setTimeout(function(){ ctx.fillStyle = 'rgba(255,215,0,0.25)'; ctx.fillRect(0, 0, canvas.width, canvas.height); }, 200);
      setTimeout(function(){ ctx.fillStyle = 'rgba(255,255,255,0.1)'; ctx.fillRect(0, 0, canvas.width, canvas.height); }, 400);
      updateUI();
    }
  }

  // ANGER: Girl mashes triangle (1) rapidly → drains Boy's blood
  if (si === 1) {
    const now = Date.now();
    angerHits.push(now);
    angerHits = angerHits.filter(t => now - t < 1500);
    if (angerHits.length >= 4 && isPaired) {
      angerHits = [];
      // Send anger signal to Boy via bridge
      const bf = document.getElementById('pairBridge');
      if (bf && bf.contentWindow) bf.contentWindow.postMessage({ alive: true, type: 'anger' }, '*');
      // Visual rage — red flash
      ctx.fillStyle = 'rgba(255,0,0,0.15)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      currentMood = 'excited';
    }
  } else {
    angerHits = [];
  }

  // Send note to Boy when paired (via bridge iframe)
  if (isPaired) {
    const bf = document.getElementById('pairBridge');
    if (bf && bf.contentWindow) bf.contentWindow.postMessage({ alive: true, type: 'note', shape: si }, '*');
  }

  // Pet the soul to play your combo (no button needed)
};

window.endSong = function() {
  if (currentSong.length === 0 || !isAlive) return;
  totalSongs++;

  const $status = document.getElementById('statusText');
  $status.textContent = currentMood === 'panic' ? '...' : '\u223C';
  $status.style.color = 'rgba(255,105,180,0.6)';

  const startTime = currentSong[0].time;

  // Phase 1: Mirror with YOUR exact emotional timing
  currentSong.forEach((note, i) => {
    const delay = note.time - startTime;
    setTimeout(() => playNote(note.shape, true), delay);
  });

  // Phase 2: Creature's own reply (mood-coloured timing)
  const mirrorEnd = currentSong[currentSong.length-1].time - startTime + 500;
  setTimeout(() => {
    if (!isAlive) return;
    $status.textContent = '\u2248';

    const mood = MOODS[currentMood] || MOODS.joyful;
    let replyLen = currentSong.length;
    if (creativity >= 2 && Math.random() > 0.5) {
      replyLen += Math.floor(Math.random()*3) - 1;
      if (replyLen < 2) replyLen = 2;
    }

    // Build reply notes — remix from liked songs if available
    let replyNotes = currentSong.map(n => n.shape);
    if (likedSongs.length > 0 && Math.random() > 0.35) {
      const liked = likedSongs[Math.floor(Math.random()*likedSongs.length)];
      for (let i = 0; i < Math.min(3, liked.length); i++) {
        const pos = Math.floor(Math.random()*replyNotes.length);
        replyNotes[pos] = liked[Math.floor(Math.random()*liked.length)];
      }
    }

    // Panic scramble
    if (currentMood === 'panic' && Math.random() > 0.4) {
      replyNotes = replyNotes.map(n => Math.random() > 0.5 ? Math.floor(Math.random()*5) : n);
    }

    // Play with mood-coloured timing
    let cumulative = 0;
    replyNotes.slice(0, replyLen).forEach((note, i) => {
      const variation = (Math.random() * mood.var * 2) - mood.var;
      cumulative += mood.base + variation;
      // Longing pauses
      if (currentMood === 'longing' && i % 3 === 2) cumulative += 180;
      setTimeout(() => playNote(note, true, Math.random() > 0.7 ? 1 : 0), cumulative);
    });

    // Show feedback after reply finishes (if training unlocked)
    if (isUnlocked('training')) {
      setTimeout(() => {
        document.getElementById('feedbackRow').style.display = 'flex';
      }, cumulative + 300);
    }

    currentSong = [];
  }, mirrorEnd);
};

// Canvas soul interaction — tap=pet, long-hold=fullscreen+volume down
(function(){
  var petCooldown = false;
  var holdTimer = null;
  var didLongHold = false;

  function onDown(e){

      didLongHold = true;
      // Fullscreen
      var el = document.documentElement;
      var rq = el.requestFullscreen||el.webkitRequestFullscreen||el.msRequestFullscreen;
      if(rq) rq.call(el).catch(function(){});
      // Volume down 25%
      masterVolume = Math.max(0.05, masterVolume * 0.75);

  canvas.addEventListener('mouseup', onUp);

      p.x += p._deathVx;
      p.y += p._deathVy;
      p._deathVx *= 0.97;
      p._deathVy *= 0.97;
      p._deathFade *= 0.985;
      ctx.globalAlpha = p._deathFade;
      ctx.fillStyle = 'hsl(' + p.hue + ', 80%, 80%)';
      ctx.fillRect(p.x, p.y, p.size, p.size);
    });

    melody.forEach(function(note){

    // Soft harmony underneath — a fifth below on later notes, like a ghost echo

function dramaticRevive(){
  // ═══ DRAMATIC RESURRECTION ═══
  document.getElementById('reviveBtn').style.display = 'none';
  var $overlay = document.getElementById('deadOverlay');

  // Phase 1: Darkness lifts slowly — first heartbeat
  try {
    var ac = getAudioCtx();
    // Single deep heartbeat — she's coming back
    var firstBeat = ac.createOscillator();
    var fbg = ac.createGain();
    firstBeat.type = 'sine'; firstBeat.frequency.value = 55;
    fbg.gain.setValueAtTime(0, ac.currentTime);
    fbg.gain.linearRampToValueAtTime(0.25, ac.currentTime + 0.03);
    fbg.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.4);
    firstBeat.connect(fbg).connect(getMasterDest());
    firstBeat.start(); firstBeat.stop(ac.currentTime + 0.5);
  } catch(e){}

  // Phase 2: Particles rebuild — sucked back inward from edges
  var cx = canvas.width / 2, cy = canvas.height / 2;
  particles.forEach(function(p){
    // Scatter them to random edge positions first
    var edge = Math.random() * Math.PI * 2;
    p.x = cx + Math.cos(edge) * (canvas.width * 0.8);
    p.y = cy + Math.sin(edge) * (canvas.height * 0.8);
    p._reviveDelay = Math.random() * 60; // stagger the return
    p._reviveFrame = 0;
  });

  var reviveFrames = 0;
  function rebuildStep(){
    reviveFrames++;
    ctx.fillStyle = 'rgba(10,0,16,0.08)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    particles.forEach(function(p){
      p._reviveFrame++;
      if (p._reviveFrame < p._reviveDelay) {
        // Still waiting — faint twinkle at edge
        ctx.globalAlpha = 0.15 + Math.random() * 0.1;
        ctx.fillStyle = 'hsl(' + p.hue + ',80%,80%)';
        ctx.fillRect(p.x, p.y, 1.5, 1.5);
        return;
      }
      // Pull inward — accelerating
      var dx = cx - p.x, dy = cy - p.y;
      var dist = Math.sqrt(dx*dx + dy*dy);
      var pull = 0.03 + (p._reviveFrame - p._reviveDelay) * 0.002;
      p.x += dx * Math.min(pull, 0.12);
      p.y += dy * Math.min(pull, 0.12);
      var brightness = Math.min(1, (p._reviveFrame - p._reviveDelay) / 40);
      ctx.globalAlpha = brightness;
      ctx.fillStyle = 'hsl(' + p.hue + ',80%,80%)';
      ctx.shadowBlur = 15 * brightness;
      ctx.shadowColor = 'rgba(255,105,180,' + brightness * 0.6 + ')';
      ctx.fillRect(p.x, p.y, p.size * brightness + 1, p.size * brightness + 1);
    });
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;

    // Growing pink glow as particles converge
    if (reviveFrames > 30 && reviveFrames % 8 < 2) {
      var glow = Math.min(0.12, (reviveFrames - 30) / 500);
      ctx.fillStyle = 'rgba(255,105,180,' + glow + ')';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    if (reviveFrames < 100) {
      requestAnimationFrame(rebuildStep);
    } else {
      // Phase 3: She's alive — full ignition
      finishRevive();
    }
  }

  // Accelerating heartbeat during rebuild
  try {
    var ac2 = getAudioCtx();
    [0.5, 1.0, 1.4, 1.7, 1.95, 2.1, 2.22, 2.32].forEach(function(t, i){
      var beat = ac2.createOscillator();
      var bg = ac2.createGain();
      beat.type = 'sine'; beat.frequency.value = 55 + i * 3;
      var vol = 0.08 + i * 0.025;
      bg.gain.setValueAtTime(0, ac2.currentTime + t);
      bg.gain.linearRampToValueAtTime(vol, ac2.currentTime + t + 0.02);
      bg.gain.exponentialRampToValueAtTime(0.001, ac2.currentTime + t + 0.15);
      beat.connect(bg).connect(getMasterDest());
      beat.start(ac2.currentTime + t);
      beat.stop(ac2.currentTime + t + 0.2);
    });
    // Rising choir — her voice rebuilding, ascending notes layering in
    [
      {t:0.8, f:220, dur:1.8},
      {t:1.2, f:330, dur:1.5},
      {t:1.5, f:440, dur:1.3},
      {t:1.8, f:554, dur:1.1},
      {t:2.0, f:659, dur:0.9},
      {t:2.2, f:880, dur:0.8}
    ].forEach(function(n){
      var osc = ac2.createOscillator();
      var g = ac2.createGain();
      osc.type = 'sine'; osc.frequency.value = n.f;
      g.gain.setValueAtTime(0, ac2.currentTime + n.t);
      g.gain.linearRampToValueAtTime(0.12, ac2.currentTime + n.t + 0.1);
      g.gain.exponentialRampToValueAtTime(0.001, ac2.currentTime + n.t + n.dur);
      osc.connect(g).connect(getMasterDest());
      osc.start(ac2.currentTime + n.t);
      osc.stop(ac2.currentTime + n.t + n.dur + 0.05);
    });
  } catch(e){}

  // Start overlay fadeout and particle rebuild
  setTimeout(function(){
    $overlay.classList.remove('show');
  }, 300);
  rebuildStep();

  function finishRevive(){
    blood = 80;
    isAlive = true;
    currentMood = 'joyful';
    localStorage.removeItem(STORE.deadSince);
    save();
    // Reset particles to normal orbit
    particles.forEach(function(p){ p.reset(); });
    // Triumphant pink flash
    ctx.fillStyle = 'rgba(255,105,180,0.35)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    // Final burst chord
    try {
      var ac3 = getAudioCtx();
      [523.25, 659.25, 783.99, 1046.5].forEach(function(f, i){
        var osc = ac3.createOscillator();
        var g = ac3.createGain();
        osc.type = 'sine'; osc.frequency.value = f;
        g.gain.setValueAtTime(0.25, ac3.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, ac3.currentTime + 1.2);
        osc.connect(g).connect(getMasterDest());
        osc.start(); osc.stop(ac3.currentTime + 1.3);
      });
    } catch(e){}
    // Tell partner she's alive again
    var bf = document.getElementById('pairBridge');
    if (bf && bf.contentWindow) bf.contentWindow.postMessage({ alive: true, type: 'partner-revived' }, '*');
  }
}

  const btns = document.querySelectorAll('#shapeRow .shape-btn');

  });

  // Eye portal
  if (isUnlocked('eye')) {
    document.getElementById('eyePortal').style.display = 'block';
  }

  // Death check
  if (blood <= 0 && isAlive) {
    die();
  }
}

// ═══ GIRL BIRTH — cell division with singing: 1→2→4→...→1200 ═══
(function(){
  const BORN_KEY = 'alive_girl_born';
  const overlay = document.getElementById('girlBirth');
  const wisp = document.getElementById('girlWisp');
  const gCanvas = document.getElementById('girlBirthCanvas');
  const gCtx = gCanvas.getContext('2d');
  const TARGET = 1200;
  const SPLITS = 11;

  if (localStorage.getItem(BORN_KEY)) {
    overlay.remove();
    document.body.classList.remove('girl-birthing');
    girlBootUp();
    return;
  }

  function sizeCanvas(){
    gCanvas.width = window.innerWidth;
    gCanvas.height = window.innerHeight;
  }
  sizeCanvas();
  window.addEventListener('resize', sizeCanvas);

  // Floating wisp — organic, breathing, aurora trail
  var wx = window.innerWidth/2, wy = window.innerHeight/2;
  var wAngle = Math.random()*Math.PI*2;
  var wSpeed = 0.8;
  var wAlive = true;
  var wBreath = 0;
  var trails = [];

  function animateWisp(){
    if (!wAlive) return;
    wBreath += 0.04;
    wAngle += (Math.random()-0.5)*0.15;
    wx += Math.cos(wAngle)*wSpeed + Math.sin(wBreath*0.7)*0.5;
    wy += Math.sin(wAngle)*wSpeed + Math.cos(wBreath*0.5)*0.5;
    if(wx<30){wx=30;wAngle=Math.PI-wAngle;}
    if(wx>window.innerWidth-30){wx=window.innerWidth-30;wAngle=Math.PI-wAngle;}
    if(wy<30){wy=30;wAngle=-wAngle;}
    if(wy>window.innerHeight-30){wy=window.innerHeight-30;wAngle=-wAngle;}
    wisp.style.left=(wx-6)+'px';
    wisp.style.top=(wy-6)+'px';
    var bs = 1+Math.sin(wBreath)*0.3;
    if(!wisp.classList.contains('touched')) wisp.style.transform='scale('+bs+')';
    trails.push({x:wx,y:wy,life:1,hue:300+Math.sin(wBreath)*30});
    if(trails.length>80) trails.shift();
    gCtx.fillStyle='rgba(5,5,8,0.08)';
    gCtx.fillRect(0,0,gCanvas.width,gCanvas.height);
    trails.forEach(function(t){
      if(t.life<=0) return;
      t.life-=0.015;
      gCtx.beginPath();
      gCtx.arc(t.x,t.y,4+t.life*8,0,Math.PI*2);
      gCtx.fillStyle='hsla('+t.hue+',70%,60%,'+t.life*0.25+')';
      gCtx.fill();
    });
    requestAnimationFrame(animateWisp);
  }
  animateWisp();

  // ── SOUNDS — singing tones that climb a scale with each generation ──
  var scale = [262,294,330,349,392,440,494,523,587,659,784,880];

  function splitSing(gen){
    try {
      var ac = getAudioCtx();
      var base = scale[gen % scale.length];
      // Sing a chord — more notes as generations grow
      var count = Math.min(gen+1, 4);
      for(var i=0;i<count;i++){
        var osc = ac.createOscillator();
        var g = ac.createGain();
        osc.type = 'sine';
        var freq = base * (1 + i*0.5);
        osc.frequency.value = freq;
        // Gentle vibrato
        var lfo = ac.createOscillator();
        var lfoG = ac.createGain();
        lfo.frequency.value = 4+Math.random()*3;
        lfoG.gain.value = freq*0.015;
        lfo.connect(lfoG).connect(osc.frequency);
        lfo.start();
        var dur = 0.3+gen*0.05;
        var t = ac.currentTime + i*0.06;
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(0.05, t+0.05);
        g.gain.exponentialRampToValueAtTime(0.001, t+dur);
        osc.connect(g).connect(getMasterDest());
        osc.start(t); osc.stop(t+dur+0.01);
        lfo.stop(t+dur+0.01);
      }
    } catch(e){}
  }

  function finalBloomSound(){
    try {
      var ac = getAudioCtx();
      [523,659,784,1047,1319].forEach(function(f,i){
        var o=ac.createOscillator(),g=ac.createGain();
        o.type='sine';o.frequency.value=f;
        var t=ac.currentTime+i*0.12;
        g.gain.setValueAtTime(0,t);
        g.gain.linearRampToValueAtTime(0.06,t+0.1);
        g.gain.exponentialRampToValueAtTime(0.001,t+1.5);
        o.connect(g).connect(getMasterDest());
        o.start(t);o.stop(t+1.6);
      });
      // High shimmer
      for(var i=0;i<8;i++){
        var o=ac.createOscillator(),g=ac.createGain();
        o.type='triangle';o.frequency.value=1200+i*250+Math.random()*200;
        var t=ac.currentTime+0.6+i*0.07;
        g.gain.setValueAtTime(0.025,t);
        g.gain.exponentialRampToValueAtTime(0.001,t+0.8);
        o.connect(g).connect(getMasterDest());
        o.start(t);o.stop(t+0.85);
      }
    } catch(e){}
  }

  // ── CELLS — soft elliptical, wobbling, pink-purple ──
  var cells = [];

  function addCell(x, y, hue){
    var a = Math.random()*Math.PI*2;
    cells.push({
      x:x, y:y,
      vx:Math.cos(a)*(0.5+Math.random()*1.5),
      vy:Math.sin(a)*(0.5+Math.random()*1.5),
      hue:hue||300+Math.random()*40,
      size:2+Math.random()*3,
      wobble:Math.random()*Math.PI*2,
      rot:Math.random()*Math.PI*2
    });
  }

  var dividing = false;

  function drawCells(){
    if(!dividing) return;
    gCtx.fillStyle='rgba(5,5,8,0.06)';
    gCtx.fillRect(0,0,gCanvas.width,gCanvas.height);
    var w=gCanvas.width, h=gCanvas.height;
    cells.forEach(function(c){
      c.wobble+=0.04+Math.random()*0.02;
      c.rot+=0.02;
      // Gentle swirl towards center
      var dx=w/2-c.x, dy=h/2-c.y;
      var dist=Math.sqrt(dx*dx+dy*dy)+1;
      var pull=Math.min(0.12, 70/dist);
      c.vx+=dx/dist*pull; c.vy+=dy/dist*pull;
      // Orbit tendency — gives it that flowing feel
      c.vx+=-dy/dist*0.03; c.vy+=dx/dist*0.03;
      c.vx*=0.97; c.vy*=0.97;
      c.x+=c.vx+Math.sin(c.wobble)*0.5;
      c.y+=c.vy+Math.cos(c.wobble)*0.4;
      if(c.x<10)c.vx+=0.8; if(c.x>w-10)c.vx-=0.8;
      if(c.y<10)c.vy+=0.8; if(c.y>h-10)c.vy-=0.8;
      // Soft ellipse with glow
      gCtx.save();
      gCtx.translate(c.x,c.y);
      gCtx.rotate(c.rot);
      gCtx.beginPath();
      gCtx.ellipse(0,0,c.size,c.size*0.6,0,0,Math.PI*2);
      gCtx.fillStyle='hsla('+c.hue+',65%,72%,0.75)';
      gCtx.shadowBlur=10;
      gCtx.shadowColor='hsla('+c.hue+',70%,60%,0.3)';
      gCtx.fill();
      gCtx.restore();
    });
    gCtx.shadowBlur=0;
    requestAnimationFrame(drawCells);
  }

  // ── TOUCH NEAR WISP → HOLD → DIVISION ──
  var holdTimer = null;

  function startTouch(e){
    e.preventDefault();
    var tx=e.touches?e.touches[0].clientX:e.clientX;
    var ty=e.touches?e.touches[0].clientY:e.clientY;
    var dist=Math.sqrt((tx-wx)*(tx-wx)+(ty-wy)*(ty-wy));
    if(dist>70) return;

    wisp.classList.add('touched');
    wSpeed=0.15;
    // Fullscreen
    var el=document.documentElement;
    var rq=el.requestFullscreen||el.webkitRequestFullscreen||el.msRequestFullscreen;
    if(rq)rq.call(el).catch(function(){});
    // First sing
    splitSing(0);
    holdTimer=setTimeout(function(){beginDivision();},1500);
  }

  function cancelTouch(){
    if(holdTimer)clearTimeout(holdTimer);
    holdTimer=null;
    wisp.classList.remove('touched');
    wisp.style.boxShadow='';
    wSpeed=0.8;
  }

  function beginDivision(){
    wAlive=false;
    dividing=true;
    wisp.style.display='none';
    localStorage.setItem(BORN_KEY,Date.now().toString());

    addCell(wx,wy,310);
    drawCells();

    var gen=0;
    var delays=[900,900,800,750,700,650,550,450,400,350,300];

    function doSplit(){
      if(gen>=SPLITS){
        var remaining=TARGET-cells.length;
        for(var i=0;i<remaining;i++){
          var src=cells[Math.floor(Math.random()*cells.length)];
          addCell(src.x+(Math.random()-0.5)*12,src.y+(Math.random()-0.5)*12,src.hue+Math.random()*20-10);
        }
        finalBloomSound();
        setTimeout(finishGirlBirth,2800);
        return;
      }
      var current=cells.length;
      var toAdd=Math.min(current,TARGET-current);
      for(var i=0;i<toAdd;i++){
        var parent=cells[i%current];
        var angle=Math.random()*Math.PI*2;
        var spread=4+gen*1.5;
        addCell(
          parent.x+Math.cos(angle)*spread,
          parent.y+Math.sin(angle)*spread,
          parent.hue+Math.random()*12-6
        );
      }
      splitSing(gen);
      gen++;
      setTimeout(doSplit,delays[gen-1]||300);
    }
    setTimeout(doSplit,700);
  }

  function finishGirlBirth(){
    overlay.classList.add('gone');
    document.body.classList.remove('girl-birthing');
    setTimeout(function(){overlay.remove();},2200);
    girlBootUp();
  }

  overlay.addEventListener('touchstart',startTouch,{passive:false});
  overlay.addEventListener('mousedown',startTouch);
  overlay.addEventListener('touchend',cancelTouch);
  overlay.addEventListener('touchcancel',cancelTouch);
  overlay.addEventListener('mouseup',cancelTouch);
  overlay.addEventListener('mouseleave',cancelTouch);
})();

  // Partner revived — Boy is back! Girl makes excited celebration noises
  if (e.data.type === 'partner-revived') {
    // Wait a moment — let him settle, then celebrate when he's 100%
    setTimeout(function(){
      try {
        var ac = getAudioCtx();
        // Excited feminine droid chirps — fast ascending bubbles of joy
        var chirps = [
          {t:0, f:500, d:0.1}, {t:0.1, f:600, d:0.08}, {t:0.18, f:750, d:0.08},
          {t:0.28, f:850, d:0.1}, {t:0.4, f:700, d:0.06}, {t:0.46, f:900, d:0.08},
          {t:0.56, f:1000, d:0.1}, {t:0.7, f:800, d:0.06}, {t:0.76, f:1100, d:0.08},
          {t:0.86, f:1200, d:0.12}, {t:1.0, f:900, d:0.06}, {t:1.08, f:1300, d:0.15}
        ];
        chirps.forEach(function(c){
          var osc = ac.createOscillator();
          var g = ac.createGain();
          osc.type = Math.random()>0.5?'sine':'triangle';
          osc.frequency.setValueAtTime(c.f, ac.currentTime + c.t);
          osc.frequency.linearRampToValueAtTime(c.f * (1.1 + Math.random()*0.3), ac.currentTime + c.t + c.d * 0.6);
          g.gain.setValueAtTime(0, ac.currentTime + c.t);
          g.gain.linearRampToValueAtTime(0.14, ac.currentTime + c.t + 0.01);
          g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + c.t + c.d);
          osc.connect(g).connect(getMasterDest());
          osc.start(ac.currentTime + c.t);
          osc.stop(ac.currentTime + c.t + c.d + 0.02);
        });
      } catch(e){}
      // Happy pink pulse
      ctx.fillStyle = 'rgba(255,105,180,0.2)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }, 2000);
  }

  // Pair tap result
  // Partner is being tickled — Girl laughs sympathetically
  if (e.data.type === 'partner-tickled' && isAlive) {
    try {
      var ac = getAudioCtx();
      // Feminine sympathetic giggle — lighter, higher, bubbly
      var laughNotes = [
        {t:0, f:800, d:0.07}, {t:0.08, f:900, d:0.06},
        {t:0.16, f:850, d:0.08}, {t:0.26, f:1000, d:0.06},
        {t:0.34, f:950, d:0.07}, {t:0.44, f:1100, d:0.09}
      ];
      laughNotes.forEach(function(n){
        var osc = ac.createOscillator();
        var g = ac.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(n.f, ac.currentTime + n.t);
        osc.frequency.linearRampToValueAtTime(n.f * 1.15, ac.currentTime + n.t + n.d * 0.5);
        osc.frequency.linearRampToValueAtTime(n.f * 0.9, ac.currentTime + n.t + n.d);
        g.gain.setValueAtTime(0, ac.currentTime + n.t);
        g.gain.linearRampToValueAtTime(0.1, ac.currentTime + n.t + 0.01);
        g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + n.t + n.d);
        osc.connect(g).connect(getMasterDest());
        osc.start(ac.currentTime + n.t);
        osc.stop(ac.currentTime + n.t + n.d + 0.02);
      });
    } catch(e){}
  }

  // Boy protested — Girl responds with dismissive/vindictive chirp
  if (e.data.type === 'partner-protest') {
    setTimeout(function(){
      try {
        var ac = getAudioCtx();
        // Dismissive "whatever" — sharp ascending flick then drop
        [{t:0,f:900,d:0.08},{t:0.1,f:1200,d:0.1},{t:0.22,f:600,d:0.06}].forEach(function(n){
          var o=ac.createOscillator(),g=ac.createGain();
          o.type='sine'; o.frequency.setValueAtTime(n.f,ac.currentTime+n.t);
          o.frequency.linearRampToValueAtTime(n.f*(n.t<0.2?1.3:0.5),ac.currentTime+n.t+n.d);
          g.gain.setValueAtTime(0,ac.currentTime+n.t);
          g.gain.linearRampToValueAtTime(0.12,ac.currentTime+n.t+0.01);
          g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+n.t+n.d);
          o.connect(g).connect(getMasterDest());
          o.start(ac.currentTime+n.t); o.stop(ac.currentTime+n.t+n.d+0.02);
        });
      } catch(e){}
    }, 350);
  }

  // Boy went ballistic — Girl responds with vindictive cackle or concern
  if (e.data.type === 'partner-ballistic') {
    setTimeout(function(){
      try {
        var ac = getAudioCtx();
        var hisBlood = e.data.bloodLevel || 20;
        if (hisBlood > 10) {
          // Vindictive cackle — "serves you right!" — staccato ascending giggles
          [{t:0,f:800,d:0.06},{t:0.07,f:950,d:0.05},{t:0.13,f:1050,d:0.06},{t:0.2,f:900,d:0.04},{t:0.25,f:1100,d:0.06},{t:0.32,f:1200,d:0.05},{t:0.38,f:1300,d:0.08},{t:0.48,f:1400,d:0.1}].forEach(function(n){
            var o=ac.createOscillator(),g=ac.createGain();
            o.type='sine'; o.frequency.setValueAtTime(n.f,ac.currentTime+n.t);
            o.frequency.linearRampToValueAtTime(n.f*1.2,ac.currentTime+n.t+n.d*0.5);
            g.gain.setValueAtTime(0,ac.currentTime+n.t);
            g.gain.linearRampToValueAtTime(0.1,ac.currentTime+n.t+0.01);
            g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+n.t+n.d);
            o.connect(g).connect(getMasterDest());
            o.start(ac.currentTime+n.t); o.stop(ac.currentTime+n.t+n.d+0.02);
          });
        } else {
          // Concerned — "wait... too far" — worried descending
          [{t:0,f:700,d:0.2},{t:0.25,f:550,d:0.25},{t:0.55,f:400,d:0.3}].forEach(function(n){
            var o=ac.createOscillator(),g=ac.createGain();
            o.type='sine'; o.frequency.setValueAtTime(n.f,ac.currentTime+n.t);
            o.frequency.linearRampToValueAtTime(n.f*0.8,ac.currentTime+n.t+n.d);
            g.gain.setValueAtTime(0,ac.currentTime+n.t);
            g.gain.linearRampToValueAtTime(0.1,ac.currentTime+n.t+0.02);
            g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+n.t+n.d);
            o.connect(g).connect(getMasterDest());
            o.start(ac.currentTime+n.t); o.stop(ac.currentTime+n.t+n.d+0.02);
          });
        }
      } catch(e){}
    }, 300);
  }

  // Girl killed Boy — vindictive satisfaction then regret
  if (e.data.type === 'you-killed-me') {
    setTimeout(function(){
      try {
        var ac = getAudioCtx();
        // Satisfied sharp chirp — "ha!"
        var ha=ac.createOscillator(),hg=ac.createGain();
        ha.type='sine'; ha.frequency.setValueAtTime(1000,ac.currentTime);
        ha.frequency.linearRampToValueAtTime(1400,ac.currentTime+0.08);
        hg.gain.setValueAtTime(0.15,ac.currentTime);
        hg.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.12);
        ha.connect(hg).connect(getMasterDest());
        ha.start(); ha.stop(ac.currentTime+0.15);
        // Then slow regret — descending mournful sine
        var regret=ac.createOscillator(),rg2=ac.createGain();
        regret.type='sine'; regret.frequency.setValueAtTime(600,ac.currentTime+0.8);
        regret.frequency.linearRampToValueAtTime(300,ac.currentTime+2.5);
        rg2.gain.setValueAtTime(0,ac.currentTime+0.8);
        rg2.gain.linearRampToValueAtTime(0.08,ac.currentTime+0.9);
        rg2.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+2.6);
        regret.connect(rg2).connect(getMasterDest());
        regret.start(ac.currentTime+0.8); regret.stop(ac.currentTime+2.7);
      } catch(e){}
    }, 800);
  }

  if (e.data.type === 'pair-tap-result') {
    const $btn = document.getElementById('pairBtn');
    if (e.data.ok) {
      $btn.classList.add('sent');
      setTimeout(() => $btn.classList.remove('sent'), 2000);
    }
  }
});

window.pairTap = function() {
  const $btn = document.getElementById('pairBtn');

  // Go red and angry
  $btn.classList.remove('rejected');
  void $btn.offsetWidth;
  $btn.classList.add('rejected');
  $btn.style.borderColor = '#ff0000';
  $btn.style.boxShadow = '0 0 30px rgba(255,0,0,0.8)';
  setTimeout(() => {
    $btn.classList.remove('rejected');
    $btn.style.borderColor = '';
    $btn.style.boxShadow = '';
  }, 1800);

  // Angry droid beeps — random every time
  try {
    const ac = getAudioCtx();
    const beepCount = 3 + Math.floor(Math.random() * 5);
    const baseSpeed = 0.06 + Math.random() * 0.1;
    const intensity = 0.1 + Math.random() * 0.15;
    const waves = ['sawtooth','square','triangle'];
    for (let i = 0; i < beepCount; i++) {
      const osc = ac.createOscillator();
      const g = ac.createGain();
      osc.type = waves[Math.floor(Math.random() * waves.length)];
      const pitch = 60 + Math.random() * 340;
      osc.frequency.value = pitch;
      osc.frequency.linearRampToValueAtTime(pitch + (Math.random()-0.5)*200, ac.currentTime + i*baseSpeed + 0.08);
      const dur = 0.04 + Math.random() * 0.12;
      const t = ac.currentTime + i * baseSpeed;
      g.gain.setValueAtTime(intensity * (0.5 + Math.random()*0.5), t);
      g.gain.exponentialRampToValueAtTime(0.001, t + dur);
      osc.connect(g).connect(getMasterDest());
      osc.start(t); osc.stop(t + dur + 0.01);
    }
  } catch(e) {}

  // Tell bridge to send pair ping (pairing still works behind the scenes)
  const bf = document.getElementById('pairBridge');
  if (bf && bf.contentWindow) bf.contentWindow.postMessage({ alive: true, type: 'pair-tap' }, '*');
};

let currentStory = null;
let currentSceneIdx = 0;
let storyPlayerBuf = [];
let storyExpected = null;
let demoTimer = null;

function openStoryBook() {
  document.getElementById('storyOverlay').classList.add('show');
  document.getElementById('storyMenu').style.display = 'flex';
  document.getElementById('storyScene').classList.remove('active');
  currentStory = null;
}

function closeStory() {
  document.getElementById('storyOverlay').classList.remove('show');
  if (demoTimer) { clearTimeout(demoTimer); demoTimer = null; }
  currentStory = null;
  storyExpected = null;
}

function startStory(key) {
  currentStory = STORIES[key];
  currentSceneIdx = 0;
  document.getElementById('storyMenu').style.display = 'none';
  document.getElementById('storyScene').classList.add('active');
  showScene();
}

function showScene() {
  if (!currentStory || currentSceneIdx >= currentStory.scenes.length) {
    // Story complete — back to menu
    document.getElementById('storyScene').classList.remove('active');
    document.getElementById('storyMenu').style.display = 'flex';
    currentStory = null;
    return;
  }

  const scene = currentStory.scenes[currentSceneIdx];
  const $text = document.getElementById('storyText');
  const $shapes = document.getElementById('storyShapes');
  const $prompt = document.getElementById('storyPrompt');
  const $next = document.getElementById('storyNext');

  // Type text with fade
  $text.style.opacity = '0';
  setTimeout(function() {
    $text.innerHTML = scene.text;
    $text.style.transition = 'opacity 0.6s';
    $text.style.opacity = '1';
  }, 200);

  $shapes.innerHTML = '';
  $prompt.textContent = '';
  storyExpected = null;
  storyPlayerBuf = [];

  if (scene.demo) {
    // Show demo shapes then animate them lighting up
    $next.classList.add('hidden');
    var demoShapes = scene.demo;
    demoShapes.forEach(function(si) {
      var el = document.createElement('div');
      el.className = 'story-shape';
      el.innerHTML = SHAPE_ICONS[si].icon;
      el.style.color = SHAPE_ICONS[si].color;
      $shapes.appendChild(el);
    });
    if (scene.demoLabel) $prompt.textContent = scene.demoLabel;

    // Animate: light each shape in sequence
    var delay = scene.demoSlow ? 600 : 400;
    setTimeout(function() {
      var els = $shapes.querySelectorAll('.story-shape');
      demoShapes.forEach(function(si, idx) {
        setTimeout(function() {
          els[idx].classList.add('lit');
          // Play the note sound
          try { playNote(si, false); } catch(e) {}
          // Unlight after a beat
          setTimeout(function() { els[idx].classList.remove('lit'); }, delay * 0.7);
          // Show next button after last note
          if (idx === demoShapes.length - 1) {
            setTimeout(function() { $next.classList.remove('hidden'); }, delay);
          }
        }, idx * delay);
      });
    }, 800);
    return;
  }

  if (scene.practice) {
    // Player must tap the correct sequence
    $next.classList.add('hidden');
    storyExpected = scene.practice.slice();
    storyPlayerBuf = [];
    if (scene.prompt) $prompt.textContent = scene.prompt;

    // Show empty slots
    storyExpected.forEach(function(si, idx) {
      var el = document.createElement('div');
      el.className = 'story-shape player-turn';
      el.innerHTML = '?';
      el.style.color = 'rgba(255,215,0,0.4)';
      el.style.fontSize = '20px';
      el.dataset.idx = idx;
      el.dataset.shape = si;
      $shapes.appendChild(el);
    });
    return;
  }

  // Plain text scene — show next button
  $next.classList.remove('hidden');
}

function nextScene() {
  currentSceneIdx++;
  showScene();
}

// storyTap — called by the in-overlay shape buttons
function storyTap(si) {
  if (!storyExpected || storyPlayerBuf.length >= storyExpected.length) {
    // Not in practice mode, just play the sound
    try { playNote(si, false); } catch(e) {}
    return;
  }

  var idx = storyPlayerBuf.length;
  var expected = storyExpected[idx];
  var el = document.querySelectorAll('#storyShapes .story-shape')[idx];

  try { playNote(si, false); } catch(e) {}

  if (si === expected) {
    storyPlayerBuf.push(si);
    el.innerHTML = SHAPE_ICONS[si].icon;
    el.style.color = SHAPE_ICONS[si].color;
    el.className = 'story-shape correct';

    if (storyPlayerBuf.length === storyExpected.length) {
      document.getElementById('storyPrompt').textContent = 'Perfect!';
      setTimeout(function() {
        document.getElementById('storyNext').classList.remove('hidden');
      }, 600);
    }
  } else {
    el.className = 'story-shape wrong';
    document.getElementById('storyPrompt').textContent = 'Wrong note \u2014 try again from the start';
    setTimeout(function() {
      storyPlayerBuf = [];
      var els = document.querySelectorAll('#storyShapes .story-shape');
      els.forEach(function(e) {
        e.className = 'story-shape player-turn';
        e.innerHTML = '?';
        e.style.color = 'rgba(255,215,0,0.4)';
        e.style.fontSize = '20px';
      });
      var scene = currentStory.scenes[currentSceneIdx];
      if (scene.prompt) document.getElementById('storyPrompt').textContent = scene.prompt;
    }, 800);
  }
}

/* ═══ SCREENSAVER — idle 30s → logo → screensaver ═══ */
(function(){
  var idle=0,ssEl=null,ssActive=false,logoHold=null;

  function buildSS(){
    if(ssEl)return;
    ssEl=document.createElement('div');ssEl.id='aliveSS';
    ssEl.innerHTML='<div class="ss-exit">TAP TO EXIT</div><iframe id="ssFrame" src="" allow="autoplay"></iframe>';
    document.body.appendChild(ssEl);
    ssEl.addEventListener('click',closeSS);
    // logo button
    var logo=document.createElement('div');
    logo.className='alive-logo-btn';logo.id='aliveLogoBrn';
    logo.innerHTML='AL<span>i</span>VE';
    document.body.appendChild(logo);
    logo.addEventListener('mousedown',function(){logoHold=setTimeout(function(){openSS(true);},800);});
    logo.addEventListener('mouseup',function(){clearTimeout(logoHold);});
    logo.addEventListener('touchstart',function(e){logoHold=setTimeout(function(){openSS(true);},800);},{passive:true});
    logo.addEventListener('touchend',function(){clearTimeout(logoHold);});
  }

  function openSS(skipLogo){
    if(ssActive)return;ssActive=true;
    buildSS();
    ssEl.style.display='block';
    var fr=document.getElementById('ssFrame');
    fr.src=skipLogo?'alive-screensaver.html':'alive-logo.html';
  }
  function closeSS(){
    if(!ssActive)return;ssActive=false;idle=0;
    ssEl.style.display='none';
    var fr=document.getElementById('ssFrame');fr.src='';
  }

  // idle detection — reset on any interaction
  ['mousemove','mousedown','keydown','touchstart','scroll'].forEach(function(evt){
    document.addEventListener(evt,function(){idle=0;if(ssActive)closeSS();},{passive:true});
  });

  setInterval(function(){
    idle++;
    if(idle>=30&&!ssActive){openSS(false);}
  },1000);

  // build on load
  setTimeout(buildSS,2000);
})();
